
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>订单管理 - JPetStore 管理后台</title>
</head>
<body>
<div th:fragment="content">
    <div class="card">
        <div class="card-header">订单管理</div>
        
        <form th:action="@{/admin/orders}" method="get" class="search-form">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="搜索订单ID或用户...">
            <select name="status">
                <option value="">全部状态</option>
                <option value="PENDING" th:selected="${status == 'PENDING'}">待处理</option>
                <option value="APPROVED" th:selected="${status == 'APPROVED'}">已批准</option>
                <option value="SHIPPED" th:selected="${status == 'SHIPPED'}">已发货</option>
            </select>
            <button type="submit" class="btn btn-primary">搜索</button>
            <a th:href="@{/admin/orders}" class="btn btn-warning">重置</a>
        </form>
        
        <table>
            <thead>
                <tr>
                    <th>订单ID</th>
                    <th>用户</th>
                    <th>下单时间</th>
                    <th>总金额</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orderPage.records}">
                    <td th:text="${order.orderId}">-</td>
                    <td th:text="${order.userId}">-</td>
                    <td th:text="${#dates.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">-</td>
                    <td th:text="'¥' + ${order.totalPrice}">-</td>
                    <td>
                        <span class="badge badge-warning" th:if="${order.status == 'PENDING'}">待处理</span>
                        <span class="badge badge-info" th:if="${order.status == 'APPROVED'}">已批准</span>
                        <span class="badge badge-success" th:if="${order.status == 'SHIPPED'}">已发货</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/orders/' + ${order.orderId}}" class="btn btn-primary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">详情</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orderPage.records)}">
                    <td colspan="6" style="text-align: center; padding: 2rem;">暂无数据</td>
                </tr>
            </tbody>
        </table>
        
        <div class="pagination" th:if="${orderPage.pages > 0}">
            <a th:if="${orderPage.current > 1}" th:href="@{/admin/orders(pageNum=${orderPage.current - 1}, pageSize=${orderPage.size}, keyword=${keyword}, status=${status})}">上一页</a>
            <span th:each="i : ${#numbers.sequence(1, orderPage.pages)}" 
                  th:classappend="${i == orderPage.current} ? 'active'"
                  th:if="${orderPage.pages <= 10 or i == 1 or i == orderPage.pages or (i >= orderPage.current - 2 and i <= orderPage.current + 2)}"
                  th:href="@{/admin/orders(pageNum=${i}, pageSize=${orderPage.size}, keyword=${keyword}, status=${status})}"
                  th:text="${i}">1</span>
            <a th:if="${orderPage.current < orderPage.pages}" th:href="@{/admin/orders(pageNum=${orderPage.current + 1}, pageSize=${orderPage.size}, keyword=${keyword}, status=${status})}">下一页</a>
        </div>
    </div>
</div>
</body>
</html>
