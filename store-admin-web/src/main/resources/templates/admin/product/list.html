
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>商品管理 - JPetStore 管理后台</title>
</head>
<body>
<div th:fragment="content">
    <div class="card">
        <div class="card-header">
            <span>商品管理</span>
            <a th:href="@{/admin/products/new}" class="btn btn-success" style="float: right;">+ 新增商品</a>
        </div>
        
        <form th:action="@{/admin/products}" method="get" class="search-form">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="搜索商品名称...">
            <select name="categoryId">
                <option value="">全部分类</option>
                <option th:each="cat : ${categories}" 
                        th:value="${cat.categoryId}" 
                        th:text="${cat.name}"
                        th:selected="${categoryId == cat.categoryId}">-</option>
            </select>
            <button type="submit" class="btn btn-primary">搜索</button>
            <a th:href="@{/admin/products}" class="btn btn-warning">重置</a>
        </form>
        
        <table>
            <thead>
                <tr>
                    <th>商品ID</th>
                    <th>商品名称</th>
                    <th>分类</th>
                    <th>描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${productPage.records}">
                    <td th:text="${product.productId}">-</td>
                    <td th:text="${product.name}">-</td>
                    <td th:text="${product.categoryId}">-</td>
                    <td th:text="${product.description}">-</td>
                    <td>
                        <a th:href="@{'/admin/products/' + ${product.productId}}" class="btn btn-primary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">详情</a>
                        <a th:href="@{'/admin/products/' + ${product.productId} + '/edit'}" class="btn btn-warning" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">编辑</a>
                        <button class="btn btn-danger delete-product-btn" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" 
                                th:data-id="${product.productId}">删除</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(productPage.records)}">
                    <td colspan="5" style="text-align: center; padding: 2rem;">暂无数据</td>
                </tr>
            </tbody>
        </table>
        
        <div class="pagination" th:if="${productPage.pages > 0}">
            <a th:if="${productPage.current > 1}" th:href="@{/admin/products(pageNum=${productPage.current - 1}, pageSize=${productPage.size}, keyword=${keyword}, categoryId=${categoryId})}">上一页</a>
            <span th:each="i : ${#numbers.sequence(1, productPage.pages)}" 
                  th:classappend="${i == productPage.current} ? 'active'"
                  th:if="${productPage.pages <= 10 or i == 1 or i == productPage.pages or (i >= productPage.current - 2 and i <= productPage.current + 2)}"
                  th:href="@{/admin/products(pageNum=${i}, pageSize=${productPage.size}, keyword=${keyword}, categoryId=${categoryId})}"
                  th:text="${i}">1</span>
            <a th:if="${productPage.current < productPage.pages}" th:href="@{/admin/products(pageNum=${productPage.current + 1}, pageSize=${productPage.size}, keyword=${keyword}, categoryId=${categoryId})}">下一页</a>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.delete-product-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (confirm('确定要删除这个商品吗？')) {
                    const id = this.getAttribute('data-id');
                    fetch(`/admin/products/${id}`, {
                        method: 'DELETE'
                    }).then(response => response.json())
                      .then(result => {
                          if (result.code === 200) {
                              alert('删除成功');
                              location.reload();
                          } else {
                              alert('删除失败：' + result.message);
                          }
                      });
                }
            });
        });
    </script>
</div>
</body>
</html>
