
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="${isEdit} ? '编辑分类' : '新增分类'">分类表单</title>
</head>
<body>
<div th:fragment="content">
    <div class="card">
        <div class="card-header" th:text="${isEdit} ? '编辑分类' : '新增分类'">分类表单</div>
        
        <form id="categoryForm">
            <div class="form-group">
                <label>分类ID</label>
                <input type="text" name="categoryId" th:value="${category?.categoryId}" 
                       th:readonly="${isEdit}" placeholder="留空则自动生成">
            </div>
            
            <div class="form-group">
                <label>分类名称 *</label>
                <input type="text" name="name" th:value="${category?.name}" required>
            </div>
            
            <div class="form-group">
                <label>描述</label>
                <textarea name="description" rows="4" th:text="${category?.description}"></textarea>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/admin/categories}" class="btn btn-warning">取消</a>
            </div>
        </form>
    </div>
    
    <script>
        document.getElementById('categoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            const isEdit = [[${isEdit}]] || false;
            const categoryId = [[${category?.categoryId}]] || '';
            
            const url = isEdit ? `/admin/categories/${categoryId}` : '/admin/categories';
            const method = isEdit ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => response.json())
              .then(result => {
                  if (result.code === 200) {
                      alert('保存成功');
                      window.location.href = '/admin/categories';
                  } else {
                      alert('保存失败：' + result.message);
                  }
              });
        });
    </script>
</div>
</body>
</html>
